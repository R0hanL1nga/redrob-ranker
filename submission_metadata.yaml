ai_usage_summary: |
  Used Claude for initial architectural ideation, component design, and core feature engineering logic. 
  Used Gemini for pipeline debugging, terminal encoding fixes, cloud infrastructure migration to Google Colab, and submission specification compliance. 
  Crucially, all candidate processing, feature extraction, and ranking calculations were executed locally/in-container on CPU; no raw candidate data or PII was transmitted to or processed by any external LLM APIs during pipeline runtime.
methodology_summary: |
  Rule-based scoring pipeline with explicit multi-dimensional feature
  engineering. Five primary components (skill match: 35%, career relevance: 30%,
  experience fit: 15%, education: 10%, certifications: 10%) are combined to form 
  a base competency score, which is then refined by a multiplicative behavioral-signal modifier.

  The career_relevance component evaluates title alignment and a product-vs-
  consulting company ratio to surface genuine machine learning practitioners over
  keyword stuffers. To ensure algorithmic integrity, a keyword_stuffer_flag applies 
  a strict 0.20 penalty to candidates boasting extensive AI skills but holding 
  entirely non-technical career titles.

  Behavioral signals (availability, engagement, reliability, and profile quality) 
  dynamically modify the primary competency score within a [0.60, 1.00] scaling range. 
  This ensures that a perfect-on-paper but completely inactive candidate loses up to 
  40% of their final rank, prioritizing high-intent talent. 

  The architecture is heavily optimized for horizontal scaling; utilizing vectorized 
  operations via pandas, the pipeline achieved a benchmark runtime of 26.9 seconds 
  to process, score, and rank all 100,000 candidates entirely on a standard 2-core 
  Google Colab CPU instance.

